name: Bug report
description: Something isn't working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out all sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps to reproduce the behaviour.
      placeholder: |
        1. Run `uv run wavern ...`
        2. Import audio file ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. Fedora 41, Ubuntu 24.04, macOS 15"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "e.g. 3.12.3 (uv run python --version)"
    validations:
      required: true

  - type: input
    id: gpu
    attributes:
      label: GPU / OpenGL version
      placeholder: "e.g. NVIDIA RTX 3070, OpenGL 4.6"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or tracebacks
      description: Paste any error output here.
      render: text
    validations:
      required: false
