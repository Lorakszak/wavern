name: Feature request
description: Propose a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a feature request, check [Discussions](https://github.com/Lorakszak/wavern/discussions)
        to see if it has already been proposed.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem does this feature solve? What limitation are you hitting?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you'd like, with as much detail as possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you tried any workarounds or alternative approaches?
    validations:
      required: false

  - type: dropdown
    id: category
    attributes:
      label: Visualization category (if applicable)
      description: Is this related to a specific type of visualization?
      options:
        - Not visualization-specific
        - Spectrum / frequency
        - Waveform
        - Particle system
        - Shader / GLSL effect
        - New visualization type
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context, mockups, or references that might help.
    validations:
      required: false
